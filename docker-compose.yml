version: '3.8'

services:
  redis-server:
    image: redis:alpine   
    ports:
      - "6379:6379"

  api-gateway:
    build: .            
    ports:
      - "8000:8000"
    depends_on:
      - redis-server    


  vision-worker:
    build: .                 
    command: python worker.py 
    depends_on:
      - redis-server        
    

version: '3.8'

services:
  mysql-server:
    image: mysql:8.0
    container_name: visionguard-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-visionguard_pwd}
      MYSQL_DATABASE: visionguard_db
    ports:
      - "3306:3306"
    volumes:
      - /data/visionguard/mysql_data:/var/lib/mysql

  redis-server:
    image: redis:alpine   
    ports:
      - "6379:6379"
    restart: always 

  api-gateway:
    image: wh493757101-oss/visionguard:latest
    ports:
      - "8000:8000"
    depends_on:
      - redis-server
      - mysql-server   
    restart: always
    environment:
      - REDIS_HOST=redis-server
      - MYSQL_HOST=mysql-server 
      - DB_PASSWORD=${DB_PASSWORD:-visionguard_pwd}
  vision-worker:
    image: wh493757101-oss/visionguard:latest
    command: python worker.py 
    depends_on:
      - redis-server
      - mysql-server   
    restart: always
    environment:
      - REDIS_HOST=redis-server
      - MYSQL_HOST=mysql-server 
      - DB_PASSWORD=${DB_PASSWORD:-visionguard_pwd}
    deploy:
      replicas: 3 
# .github/workflows/ci.yml
name:  VisionGuard AI QA Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' 

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: visionguard_db     
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - name:  获取代码 (Checkout)
      uses: actions/checkout@v4

    - name:  配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name:  启动 Redis 依赖
      uses: supercharge/redis-github-action@1.4.0
      with:
        redis-version: 6

    - name:  安装核心依赖
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov pytest-asyncio httpx requests openai pillow locust redis fastapi uvicorn

    - name:  启动 VisionGuard 网关后台服务
      env:
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        nohup python main.py > gateway.log 2>&1 &
        nohup python worker.py > worker.log 2>&1 &
        sleep 15 
        curl -f http://127.0.0.1:8000/openapi.json || (cat gateway.log && exit 1)

    - name:  启动 AI QA Agent 进行黑白盒攻防检测
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        IM_WEBHOOK_URL: ${{ secrets.IM_WEBHOOK_URL }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      run: |
        python ci_pipeline.py

    - name:  上传 AI 诊断报告与覆盖率 (Artifact)
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: visionguard-qa-reports
        path: test_reports/ 
        retention-days: 14
    
  deploy:
    needs: test 
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name:  获取代码
        uses: actions/checkout@v4

  
      - name:  登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      
      - name:  构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
         
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/visionguard:latest
            ${{ secrets.DOCKER_USERNAME }}/visionguard:${{ github.sha }}

    
